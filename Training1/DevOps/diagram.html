          container.innerHTML = "";
          container.appendChild(svgEl);

          // Enhance visibility for dark background
          svgEl.style.background = "#0b1020";

          // Initialize pan/zoom
          const panZoom = svgPanZoom(svgEl, {
            controlIconsEnabled: true,
            fit: true,
            center: true,
            minZoom: 0.2,
            maxZoom: 10
          });

          // Recenter on double-click
          svgEl.addEventListener('dblclick', function() {
            panZoom.fit();
            panZoom.center();
          });
        })
        .catch(function(err) {
          const pre = document.createElement('pre');
          pre.id = 'error';
          pre.textContent = 'Failed to render graph via Viz.js:\\n' + (err && err.stack ? err.stack : err);
          container.innerHTML = "";
          container.appendChild(pre);
        });
    })();
  </script>
</body>
</html>
